    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Georgia", serif;
        }

        body {
            background: linear-gradient(135deg, #fdf6f0, #ffe4e1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            color: #6b3e3e;
            text-align: center;
        }

        .envelope-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 900px;
            width: 100%;
            margin: auto;
        }



        .envelope {
            width:300px;
    height:220px;

            position: relative;
            cursor: pointer;
            perspective: 1000px;
            transition: .4s;
            margin: auto;
        }

        .envelope:hover {
            transform: translateY(-10px);
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 75px;
            background: #bc8a5f;
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            transform-origin: top;
            transition: transform 0.8s ease;
            z-index: 3;
        }

        .body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #d4a373;
            border-radius: 5px;
        }

        .envelope.open .flap {
            transform: rotateX(180deg);
        }

        .envelope:hover {
            transform: translateY(-8px);
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 110px solid transparent;
            border-right: 110px solid transparent;
            border-top: 75px solid #FFD1DC;
        }

        .label {
            position: absolute;
            width: 100%;
            text-align: center;
            bottom: 20px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        
            .letter{
    display:none;
    width:min(1400px,95vw);
    background:white;
    padding:50px;
    margin-top:50px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    line-height:1.9;
    color:#444;
}


        .letter h2 {
            margin-bottom: 15px;
            color: #8b5e5e;
        }

        .close-btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #E75480;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .close-btn:hover {
            background: #FFD1DC;
        }


        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 55px;
            height: 55px;
            background: #8B0000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.4rem;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .25);
        }
       .gallery{
    width:100%;
    max-width:1400px;
    margin-top:60px;
    padding:20px;
}

.gallery h1{
    text-align:center;
    margin-bottom:30px;
}

.gallery-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:25px;
    width:100%;
}

.gallery img,
.gallery video{
    width:100%;
    height:320px;
    object-fit:contain;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    transition:.3s;
}

.gallery img:hover,
.gallery video:hover{
    transform:scale(1.03);
}
.gallery img:nth-child(odd){
    transform:rotate(-1deg);
}

.gallery img:nth-child(even){
    transform:rotate(1deg);
}

@media(max-width:768px){

.envelope-container{
    grid-template-columns:1fr;
}

.envelope{
    width:260px;
}

.gallery-grid{
    grid-template-columns:1fr;
}

.gallery img,
.gallery video{
    height:300px;
    width:100%;
}

}

        
    </style>

function openLetter(type, element){

    const music =
    document.getElementById("bgMusic");

    if(music.paused){

        music.play().catch(() => {});

    }

    document.querySelectorAll('.envelope')
    .forEach(env => env.classList.remove('open'));

    element.classList.add('open');

    setTimeout(() => {

        const letter =
        document.getElementById("letter");

        letter.innerHTML =
        letters[type] +
        '<button class="close-btn" onclick="closeLetter()">Close</button>';

        letter.style.display = "block";

    }, 700);

}

        

        function closeLetter() {
            document.getElementById("letter").style.display = "none";
        }

        function saveGoals() {
            localStorage.setItem(
                "futureGoals",
                document.getElementById("futureNotes").value
            );
        }
        
        function scrollToGallery(element){

    document.querySelectorAll('.envelope')
    .forEach(env => env.classList.remove('open'));

    element.classList.add('open');

    setTimeout(()=>{

        document
        .querySelector('.gallery')
        .scrollIntoView({
            behavior:'smooth'
        });

    },700);
}

window.addEventListener("load", () => {

    const music =
    document.getElementById("bgMusic");

    music.play()
    .catch(error => {

});
